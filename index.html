<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastering the DOM: State-Driven To-Do List</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --border: #e5e7eb;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .todo-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            text-align: center;
            color: var(--primary);
        }

        /* Form styling */
        .todo-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .todo-input {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .todo-input:focus {
            border-color: var(--primary);
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-add {
            background-color: var(--primary);
            color: white;
        }

        .btn-add:hover {
            background-color: var(--primary-hover);
        }

        /* Filter Controls */
        .filters {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .filter-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 4px;
        }

        .filter-btn.active {
            color: var(--primary);
            background-color: #eeebff;
        }

        /* List Items */
        .todo-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
        }

        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            gap: 10px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .todo-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .todo-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .todo-text {
            font-size: 1rem;
            word-break: break-all;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        /* Edit Input mode */
        .edit-input {
            flex: 1;
            padding: 6px;
            font-size: 1rem;
            border: 1px solid var(--primary);
            border-radius: 4px;
        }

        /* Action Buttons */
        .actions {
            display: flex;
            gap: 5px;
        }

        .btn-action {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .btn-edit { color: var(--primary); }
        .btn-delete { color: var(--danger); }
        
        .btn-action:hover {
            background-color: #f3f4f6;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 20px 0;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="todo-container">
        <h1>Task Manager</h1>
        
        <form class="todo-form" id="todo-form">
            <input type="text" id="todo-input" class="todo-input" placeholder="What needs to be done?" required autocomplete="off">
            <button type="submit" class="btn btn-add">Add</button>
        </form>

        <div class="filters" id="filter-controls">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <ul class="todo-list" id="todo-list"></ul>
    </div>

    <script>
        // --- APPLICATION STATE ---
        let todos = JSON.parse(localStorage.getItem('todos')) || [];
        let currentFilter = 'all';

        // --- DOM ELEMENTS ---
        const todoForm = document.getElementById('todo-form');
        const todoInput = document.getElementById('todo-input');
        const todoList = document.getElementById('todo-list');
        const filterControls = document.getElementById('filter-controls');

        // --- CORE FUNCTIONS (CRUD & STATE) ---

        // Save state to LocalStorage
        function saveToLocalStorage() {
            localStorage.setItem('todos', JSON.stringify(todos));
        }

        // Render Application UI based on current State
        function render() {
            todoList.innerHTML = '';

            // Filter logic
            const filteredTodos = todos.filter(todo => {
                if (currentFilter === 'active') return !todo.completed;
                if (currentFilter === 'completed') return todo.completed;
                return true; // 'all'
            });

            // Empty State
            if (filteredTodos.length === 0) {
                todoList.innerHTML = `<li class="empty-state">No tasks found</li>`;
                return;
            }

            // Loop and Create Dynamic Elements
            filteredTodos.forEach(todo => {
                const li = document.createElement('li');
                li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                li.dataset.id = todo.id; // Map structural data hook

                li.innerHTML = `
                    <div class="todo-item-left">
                        <input type="checkbox" class="todo-checkbox" ${todo.completed ? 'checked' : ''}>
                        <span class="todo-text">${escapeHTML(todo.text)}</span>
                    </div>
                    <div class="actions">
                        <button class="btn-action btn-edit" title="Edit Task">✏️</button>
                        <button class="btn-action btn-delete" title="Delete Task">❌</button>
                    </div>
                `;
                todoList.appendChild(li);
            });
        }

        // Create Task
        function addTodo(text) {
            const newTodo = {
                id: Date.now().toString(), // Quick uniquely identifiable string
                text: text.trim(),
                completed: false
            };
            todos.push(newTodo);
            saveToLocalStorage();
            render();
        }

        // Toggle Task Completion (Update Status)
        function toggleTodo(id) {
            todos = todos.map(todo => 
                todo.id === id ? { ...todo, completed: !todo.completed } : todo
            );
            saveToLocalStorage();
            render();
        }

        // Update Task Text
        function updateTodoText(id, newText) {
            if (!newText.trim()) return;
            todos = todos.map(todo => 
                todo.id === id ? { ...todo, text: newText.trim() } : todo
            );
            saveToLocalStorage();
            render();
        }

        // Delete Task
        function deleteTodo(id) {
            todos = todos.filter(todo => todo.id !== id);
            saveToLocalStorage();
            render();
        }

        // Helper to escape HTML characters (Prevents XSS vulnerabilities)
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        // --- EVENT HANDLERS & DELEGATION ---

        // Form Submit -> Add Task
        todoForm.addEventListener('submit', (e) => {
            e.preventDefault();
            if (todoInput.value.trim()) {
                addTodo(todoInput.value);
                todoInput.value = '';
            }
        });

        // Advanced Event Delegation for Dynamic List Elements
        todoList.addEventListener('click', (e) => {
            const target = e.target;
            const itemRow = target.closest('.todo-item');
            if (!itemRow) return;
            const todoId = itemRow.dataset.id;

            // Handle Checkbox Toggle
            if (target.classList.contains('todo-checkbox')) {
                toggleTodo(todoId);
            }

            // Handle Delete Button
            if (target.classList.contains('btn-delete')) {
                deleteTodo(todoId);
            }

            // Handle Edit Button (Transforms text to an input field inline)
            if (target.classList.contains('btn-edit')) {
                const textSpan = itemRow.querySelector('.todo-text');
                const actionsDiv = itemRow.querySelector('.actions');
                const currentText = textSpan.textContent;

                // Create inline input element
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'edit-input';
                input.value = currentText;

                // Swap Elements
                itemRow.querySelector('.todo-item-left').replaceChild(input, textSpan);
                actionsDiv.style.display = 'none'; // Temporarily hide edit/delete options
                input.focus();

                // Save on Enter key or Blur (un-focus)
                const saveEdit = () => {
                    updateTodoText(todoId, input.value);
                };

                input.addEventListener('keydown', (event) => {
                    if (event.key === 'Enter') saveEdit();
                    if (event.key === 'Escape') render(); // Cancel edit
                });

                input.addEventListener('blur', saveEdit);
            }
        });

        // Filter Controls Handler via Delegation
        filterControls.addEventListener('click', (e) => {
            if (!e.target.classList.contains('filter-btn')) return;

            // Update UI Class
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            e.target.classList.add('active');

            // Apply filter and trigger render
            currentFilter = e.target.dataset.filter;
            render();
        });

        // --- INITIAL LAYOUT LOAD ---
        render();
    </script>
</body>
</html>
